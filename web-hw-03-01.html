<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEB.HW.03.01</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container">

<header>
    <h1>WEB.HW.03.01</h1>
</header>

<p><a href="index.html">← Назад на главную</a></p>

<section>
    <h1 id="title">Доброе утро!</h1>
    <button id="clickButton">Кликов: 0</button>
</section>

</div>

<script>
let phrases = ["Доброе утро!", "Добрый день!", "Добрый вечер!"];
let clickCount = 0;
let phraseIndex = 0;

let title = document.getElementById("title");
let button = document.getElementById("clickButton");

button.onclick = function() {
    clickCount++;
    phraseIndex++;

    if (phraseIndex >= phrases.length) {
        phraseIndex = 0;
    }

    title.textContent = phrases[phraseIndex];
    button.textContent = "Кликов: " + clickCount;
};
</script>

</body>
</html>
